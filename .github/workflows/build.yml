name: Build

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild autoclicker.sln /p:Configuration=Release /p:Platform=x64

      - name: Find exe
        run: Get-ChildItem -Recurse -Filter *.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: toadclicker
          path: "**/*.exe"
